<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartGuard · 门口监控</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
<style>
:root{
  --bg: #f7f3eb;
  --surface: rgba(255,254,249,.85);
  --surface-hover: rgba(255,254,249,.95);
  --ink-900: #1e1810;
  --ink-700: #3d3428;
  --ink-500: #6b5f50;
  --ink-300: #a3988a;
  --ink-100: #d4ccc0;
  --vermillion: #b5343a;
  --vermillion-light: rgba(181,52,58,.08);
  --vermillion-border: rgba(181,52,58,.2);
  --gold: #b8944c;
  --gold-light: rgba(184,148,76,.2);
  --gold-wash: rgba(184,148,76,.06);
  --jade: #5b8c5a;
  --radius-sm: 10px;
  --radius: 14px;
  --radius-lg: 20px;
  --shadow: 0 1px 3px rgba(30,24,16,.04),0 4px 16px rgba(30,24,16,.05);
  --shadow-lg: 0 2px 8px rgba(30,24,16,.06),0 8px 32px rgba(30,24,16,.08);
}
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:
    radial-gradient(ellipse 80% 50% at 50% -5%,rgba(184,148,76,.04) 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 85% 80%,rgba(181,52,58,.02) 0%,transparent 60%),
    var(--bg);
  font-family:'Noto Sans SC','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;padding:clamp(16px,3vw,32px);
  color:var(--ink-900);
  -webkit-font-smoothing:antialiased;
  background-attachment:fixed;
}

/* Subtle rice paper texture */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
  opacity:.6;
}

.dashboard{
  position:relative;z-index:1;
  max-width:1000px;margin:0 auto;
  display:flex;flex-direction:column;gap:clamp(14px,2vw,20px)
}

/* ============ Video ============ */
.video-stage{
  position:relative;
  background:linear-gradient(135deg,#1a1a1a 0%,#0d0d0d 100%);
  border-radius:var(--radius-lg);
  overflow:hidden;
  box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(255,255,255,.04);
  border:1px solid rgba(184,148,76,.12);
}
.video-stage::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  border-radius:inherit;
  box-shadow:inset 0 0 1px rgba(255,255,255,.06);
}
.video-stage video{
  width:100%;aspect-ratio:16/9;display:block;object-fit:cover;
}
.video-stage .overlay{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;pointer-events:none;transition:opacity .5s;
}
.video-stage .overlay.hidden{opacity:0}
.video-stage .overlay-icon{
  width:56px;height:56px;opacity:.2;color:#fff;
  animation:subtle-pulse 3s ease-in-out infinite;
}
.video-stage .overlay-text{
  font-family:'Noto Serif SC',serif;
  font-size:15px;color:rgba(255,255,255,.35);letter-spacing:4px;font-weight:300;
}
@keyframes subtle-pulse{0%,100%{opacity:.15}50%{opacity:.3}}

/* ============ Info Bar ============ */
.info-bar{
  display:flex;align-items:center;gap:clamp(10px,2vw,16px);
  padding:0 4px;
}
.clock{
  font-family:'Noto Sans SC',sans-serif;
  font-size:22px;font-weight:300;color:var(--ink-500);
  letter-spacing:4px;font-variant-numeric:tabular-nums;white-space:nowrap;
}
.divider-line{flex:1;height:1px;background:linear-gradient(to right,var(--gold-light),transparent)}
.update-text{
  font-size:12px;color:var(--ink-300);white-space:nowrap;
}

/* ============ Cards Grid ============ */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:clamp(10px,1.5vw,14px);
}

.card{
  background:var(--surface);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(184,148,76,.15);
  border-radius:var(--radius);
  padding:clamp(18px,2.5vw,24px) clamp(16px,2vw,22px);
  box-shadow:var(--shadow);
  display:flex;flex-direction:column;gap:6px;
  transition:transform .2s,box-shadow .2s,border-color .3s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:12px;right:12px;height:1px;
  background:linear-gradient(to right,transparent,rgba(184,148,76,.2),transparent);
  opacity:0;transition:opacity .3s;
}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.card:hover::before{opacity:1}

.card-eyebrow{
  font-size:11px;font-weight:500;color:var(--ink-300);
  letter-spacing:3px;text-transform:uppercase;
}
.card-value-row{display:flex;align-items:baseline;gap:6px}
.card-value{
  font-family:'Noto Serif SC',serif;
  font-size:clamp(40px,5vw,52px);font-weight:900;color:var(--ink-900);
  line-height:1.1;font-variant-numeric:tabular-nums;
}
.card-suffix{font-size:15px;color:var(--ink-300);font-weight:400}
.card-meta{font-size:14px;color:var(--ink-500);font-weight:400}

/* Status card special */
.status-row{display:flex;align-items:center;gap:8px}
.status-indicator{
  width:10px;height:10px;border-radius:50%;flex-shrink:0;
  position:relative;
}
.status-indicator::after{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  opacity:.3;animation:ripple 2s ease-out infinite;
}
.status-indicator.on{background:var(--jade)}
.status-indicator.on::after{background:var(--jade)}
.status-indicator.off{background:#ef4444}
.status-indicator.off::after{background:#ef4444}
@keyframes ripple{0%{transform:scale(1);opacity:.4}100%{transform:scale(2.5);opacity:0}}
.status-label{font-size:15px;font-weight:500;color:var(--ink-700)}

/* ============ Alarm ============ */
.alarm-banner{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--vermillion-light);
  border:1px solid var(--vermillion-border);
  border-radius:var(--radius);
  padding:14px 24px;
  font-family:'Noto Serif SC',serif;
  font-size:15px;font-weight:600;color:var(--vermillion);
  letter-spacing:1px;
  animation:alarmPulse 1.4s ease-in-out infinite;
}
.alarm-banner.hidden{display:none}
.alarm-icon{font-size:20px}
@keyframes alarmPulse{0%,100%{background:var(--vermillion-light)}50%{background:rgba(181,52,58,.14)}}

/* ============ Error ============ */
.error-toast{
  background:rgba(254,242,242,.9);backdrop-filter:blur(8px);
  border:1px solid rgba(239,68,68,.2);border-radius:var(--radius-sm);
  padding:10px 18px;text-align:center;font-size:13px;color:var(--vermillion);
}
.error-toast.hidden{display:none}

/* ============ Animations ============ */
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-1{animation:slideUp .6s cubic-bezier(.16,1,.3,1) both}
.anim-2{animation:slideUp .6s .1s cubic-bezier(.16,1,.3,1) both}
.anim-3{animation:slideUp .6s .2s cubic-bezier(.16,1,.3,1) both}

@media(max-width:640px){
  .cards{grid-template-columns:1fr}
  .card-value{font-size:38px}
}
</style>
</head>
<body>
<div class="dashboard">

  <!-- Video -->
  <div class="video-stage anim-1">
    <video id="v" muted autoplay loop playsinline></video>
    <div class="overlay" id="vp">
      <svg class="overlay-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/>
      </svg>
      <span class="overlay-text">实时画面</span>
    </div>
  </div>

  <!-- Info bar -->
  <div class="info-bar anim-2">
    <span class="clock" id="clk">--:--:--</span>
    <span class="divider-line"></span>
    <span class="update-text">更新于 <span id="ut">--</span></span>
  </div>

  <!-- Cards -->
  <div class="cards anim-2">
    <div class="card">
      <span class="card-eyebrow">当前人数</span>
      <span class="card-value-row"><span class="card-value" id="cnt">--</span><span class="card-suffix">人</span></span>
    </div>
    <div class="card">
      <span class="card-eyebrow">停留时间</span>
      <span class="card-value" id="tm">--</span>
    </div>
    <div class="card">
      <span class="card-eyebrow">设备状态</span>
      <span class="status-row">
        <span class="status-indicator" id="sd"></span>
        <span class="status-label" id="st">--</span>
      </span>
    </div>
  </div>

  <!-- Alarm -->
  <div class="alarm-banner hidden anim-3" id="al">
    <span class="alarm-icon">⚠</span>
    <span>停留已超过 <span id="ath">30</span> 秒</span>
  </div>

  <!-- Error -->
  <div class="error-toast hidden" id="err"></div>
</div>

<script>
// 配置说明见 README.md，部署时请替换为实际值
var C={pid:'YOUR_PRODUCT_ID',dname:'YOUR_DEVICE_NAME',akey:'YOUR_ACCESS_KEY',api:'https://iot-api.heclouds.com',flv:'http://YOUR_SRS_SERVER_IP:8080/live/camera.flv',alarmSec:30};

// ====== MD5 HMAC (verified) ======
function rol(n,b){return((n<<b)|(n>>>(32-b)))>>>0}
var MT=[];for(var i=0;i<64;i++)MT[i]=Math.floor(Math.abs(Math.sin(i+1))*4294967296)>>>0;
var MS=[7,12,17,22,7,12,17,22,7,12,17,22,7,12,17,22,5,9,14,20,5,9,14,20,5,9,14,20,5,9,14,20,4,11,16,23,4,11,16,23,4,11,16,23,4,11,16,23,6,10,15,21,6,10,15,21,6,10,15,21,6,10,15,21];
function md5Core(b){
  var ml=b.length*8;b.push(0x80);while((b.length%64)!==56)b.push(0);
  var mh=Math.floor(ml/0x100000000),ml2=ml>>>0;
  b.push(ml2&0xff,(ml2>>>8)&0xff,(ml2>>>16)&0xff,(ml2>>>24)&0xff,mh&0xff,(mh>>>8)&0xff,(mh>>>16)&0xff,(mh>>>24)&0xff);
  var a=0x67452301,b2=0xefcdab89,c=0x98badcfe,d=0x10325476;
  for(var blk=0;blk<b.length;blk+=64){
    var w=[];for(var t=0;t<16;t++)w[t]=b[blk+t*4]|(b[blk+t*4+1]<<8)|(b[blk+t*4+2]<<16)|(b[blk+t*4+3]<<24);
    var A=a,B=b2,C=c,D=d;
    for(var t=0;t<64;t++){
      var f,g;
      if(t<16){f=(B&C)|(~B&D);g=t}
      else if(t<32){f=(D&B)|(~D&C);g=(5*t+1)%16}
      else if(t<48){f=B^C^D;g=(3*t+5)%16}
      else{f=C^(B|~D);g=(7*t)%16}
      var T=D;D=C;C=B;B=(B+rol(A+f+MT[t]+w[g],MS[t]))>>>0;A=T
    }
    a=(a+A)>>>0;b2=(b2+B)>>>0;c=(c+C)>>>0;d=(d+D)>>>0
  }
  return[a,b2,c,d]
}
function b64e(b){var t='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/',r='';for(var i=0;i<b.length;i+=3){var a=b[i],x=i+1<b.length?b[i+1]:0,y=i+2<b.length?b[i+2]:0;r+=t[a>>2]+t[((a&3)<<4)|(x>>4)]+(i+1<b.length?t[((x&15)<<2)|(y>>6)]:'=')+(i+2<b.length?t[y&63]:'=')}return r}
function b64d(s){var t='ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/',r=[];s=s.replace(/[^A-Za-z0-9+/]/g,'');for(var i=0;i<s.length;i+=4){var a=t.indexOf(s[i]),x=t.indexOf(s[i+1]||'A'),y=t.indexOf(s[i+2]||'A'),z=t.indexOf(s[i+3]||'A'),n=(a<<18)|(x<<12)|(y<<6)|z;r.push((n>>16)&0xff);if(s[i+2]!=='=')r.push((n>>8)&0xff);if(s[i+3]!=='=')r.push(n&0xff)}return r}
function hmacMd5(k,m){
  if(k.length>64){var h=md5Core(k.slice());k=[];for(var i=0;i<h.length;i++)k.push(h[i]&0xff,(h[i]>>>8)&0xff,(h[i]>>>16)&0xff,(h[i]>>>24)&0xff)}
  var bk=new Array(64).fill(0);for(var i=0;i<Math.min(k.length,64);i++)bk[i]=k[i];
  var ip=bk.map(function(b){return b^0x36}),op=bk.map(function(b){return b^0x5c});
  var ih=md5Core(ip.concat(m)),ib=[];for(var i=0;i<ih.length;i++)ib.push(ih[i]&0xff,(ih[i]>>>8)&0xff,(ih[i]>>>16)&0xff,(ih[i]>>>24)&0xff);
  var oh=md5Core(op.concat(ib)),ob=[];for(var i=0;i<oh.length;i++)ob.push(oh[i]&0xff,(oh[i]>>>8)&0xff,(oh[i]>>>16)&0xff,(oh[i]>>>24)&0xff);
  return b64e(ob)
}
function genToken(){
  var v='2022-05-01',r='products/'+C.pid,et=String(Math.floor(Date.now()/1e3)+3600),m='md5';
  var sp=et+'\n'+m+'\n'+r+'\n'+v,kb=b64d(C.akey),sb=[];
  for(var i=0;i<sp.length;i++)sb.push(sp.charCodeAt(i)&0xff);
  return'version='+v+'&res='+encodeURIComponent(r)+'&et='+et+'&method='+m+'&sign='+encodeURIComponent(hmacMd5(kb,sb))
}
async function fetchStatus(){
  var u=C.api+'/thingmodel/query-device-property?product_id='+C.pid+'&device_name='+C.dname;
  var t=genToken(),resp=await fetch(u,{headers:{Authorization:t}}),json=await resp.json();
  if(json.code!==0)throw new Error('API '+json.code+': '+json.msg);
  return json.data
}

// ====== DOM ======
var E={};
['cnt','sd','st','tm','ut','al','ath','err','clk','vp'].forEach(function(id){E[id]=document.getElementById(id)});
function tick(){E.clk.textContent=new Date().toTimeString().slice(0,8)}setInterval(tick,1e3);tick();
function fm(s){if(s<=0)return'0s';var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return(h?h+'h ':'')+(m?m+'m ':'')+(s%60)+'s'}

var last=-1;
async function refresh(){
  try{E.err.classList.add('hidden');
    var d=await fetchStatus(),map={};d.forEach(function(p){map[p.identifier]=p});
    var on=+map.online_status?.value||0,cnt=+map.person_count?.value||0,tm=+map.timing?.value||0,lt=+map.online_status?.time||0;
    if(last>=0&&cnt!==last){var S=Date.now(),df=cnt-last;(function F(){var p=Math.min((Date.now()-S)/600,1);E.cnt.textContent=Math.round(last+df*(1-Math.pow(2,-10*p)));if(p<1)requestAnimationFrame(F)})()}else E.cnt.textContent=cnt;
    last=cnt;
    E.sd.className='status-indicator '+(on===1?'on':'off');
    E.st.textContent=on===1?'在线':'离线';
    E.tm.textContent=fm(tm);
    if(tm>C.alarmSec){E.al.classList.remove('hidden');E.ath.textContent=C.alarmSec}else E.al.classList.add('hidden');
    E.ut.textContent=new Date(lt).toLocaleString()
  }catch(e){console.error(e);E.err.classList.remove('hidden');E.err.textContent='数据获取失败: '+e.message}
}
refresh();setInterval(refresh,3e3);

// ====== Video ======
(function(){
  var v=document.getElementById('v'),err=0;
  function hide(){E.vp.classList.add('hidden')}
  function tryFlv(){
    if(typeof flvjs==='undefined'||!flvjs.isSupported())return tryHls();
    try{
      var p=flvjs.createPlayer({type:'flv',url:C.flv,isLive:true,hasAudio:false,enableWorker:true});
      p.attachMediaElement(v);p.load();
      p.play().then(hide).catch(function(){err++;setTimeout(err<3?tryFlv:tryHls,2e3)});
      p.on(flvjs.Events.LOADING_COMPLETE,hide);
      p.on(flvjs.Events.ERROR,function(){p.destroy();err++;setTimeout(err<3?tryFlv:tryHls,2e3)})
    }catch(e){tryHls()}
  }
  function tryHls(){v.src='http://YOUR_SRS_SERVER_IP:8080/live/camera.m3u8';v.play().catch(function(){})}
  v.addEventListener('playing',hide);
  tryFlv();
})();
</script>
</body>
</html>
